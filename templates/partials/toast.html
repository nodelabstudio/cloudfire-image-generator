<!-- Toast container -->
<div id="toast-container" aria-live="polite" aria-atomic="true"
  style="position:fixed; top:1rem; right:1rem; z-index:100; display:flex; flex-direction:column; gap:0.625rem; pointer-events:none;"></div>

<style>
  .cf-toast {
    pointer-events: auto;
    background: var(--paper);
    color: var(--ink);
    font-size: 0.875rem;
    font-weight: 600;
    padding: 0.875rem 1.125rem 0.875rem 1rem;
    border-radius: 999px;
    border: 1px solid var(--line);
    box-shadow: 0 14px 36px rgba(31, 27, 22, 0.10), 0 2px 6px rgba(31, 27, 22, 0.04);
    display: inline-flex;
    align-items: center;
    gap: 0.625rem;
    max-width: 22rem;
    cursor: pointer;
    transform: translateX(120%);
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
  }
  .cf-toast.is-in { transform: translateX(0); }
  .cf-toast .cf-toast-dot {
    width: 0.625rem;
    height: 0.625rem;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.95);
  }
  .cf-toast-success .cf-toast-dot { background: var(--mint-deep); }
  .cf-toast-error   .cf-toast-dot { background: #C84F6E; }
  .cf-toast-info    .cf-toast-dot { background: var(--lavender-deep); }
</style>

<script>
function showToast(message, type = "info") {
  const container = document.getElementById("toast-container");
  if (!container) return;

  const toast = document.createElement("div");
  toast.className = `cf-toast cf-toast-${type}`;
  toast.innerHTML = `<span class="cf-toast-dot"></span><span></span>`;
  toast.lastElementChild.textContent = message;
  toast.onclick = () => dismissToast(toast);

  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add("is-in"));
  setTimeout(() => dismissToast(toast), 4000);
}

function dismissToast(toast) {
  if (!toast.parentNode) return;
  toast.style.opacity = "0";
  toast.classList.remove("is-in");
  setTimeout(() => toast.remove(), 350);
}
</script>
